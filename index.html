
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WordCube Build 4</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Word Cube - Build 4</h1>
<p>SVG Placeholder on every cube face</p>

<div class="scene">
<div id="cube">

    <div class="face front">
        <img src="All-font-svg.svg" class="face-svg" alt="">
    </div>

    <div class="face back">
        <img src="All-font-svg.svg" class="face-svg" alt="">
    </div>

    <div class="face left">
        <img src="All-font-svg.svg" class="face-svg" alt="">
    </div>

    <div class="face right">
        <img src="All-font-svg.svg" class="face-svg" alt="">
    </div>

    <div class="face top">
        <img src="All-font-svg.svg" class="face-svg" alt="">
    </div>

    <div class="face bottom">
        <img src="All-font-svg.svg" class="face-svg" alt="">
    </div>

</div>
</div>

<button id="complete">Complete Face</button>

<div id="reward" class="hidden">
<h2>✨ Face Completed</h2>
<p>The completed paper face folds onto the cube.</p>
<div class="divider">❀══════════════❀</div>
</div>

<script src="script.js"></script>
</body>
</html>
