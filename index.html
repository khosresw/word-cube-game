
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WordCube Build 4</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Word Cube - Build 4</h1>
<p>SVG Placeholder on every cube face</p>

<div class="scene">
<div id="cube">
<div class="face front"><div class="svg">SVG PLACEHOLDER</div></div>
<div class="face back"><div class="svg">SVG PLACEHOLDER</div></div>
<div class="face left"><div class="svg">SVG PLACEHOLDER</div></div>
<div class="face right"><div class="svg">SVG PLACEHOLDER</div></div>
<div class="face top"><div class="svg">SVG PLACEHOLDER</div></div>
<div class="face bottom"><div class="svg">SVG PLACEHOLDER</div></div>
</div>
</div>

<button id="complete">Complete Face</button>

<div id="reward" class="hidden">
<h2>✨ Face Completed</h2>
<p>The completed paper face folds onto the cube.</p>
<div class="divider">❀══════════════❀</div>
</div>

<script src="script.js"></script>
</body>
</html>
